{% extends 'base.html' %}
{% block content %}<section class="page-hero"><div class="container"><h1>Contato</h1><p>Conte sobre seu projeto gráfico.</p></div></section><section class="section"><div class="container contact-grid"><form method="post" class="form-card">{{ form.hidden_tag() }}<label>{{ form.name.label }}{{ form.name() }}</label><label>{{ form.email.label }}{{ form.email() }}</label><label>{{ form.phone.label }}{{ form.phone() }}</label><label>{{ form.message.label }}{{ form.message(rows=6) }}</label>{{ form.submit(class='btn') }}</form><div class="info-card"><h2>Atendimento</h2><p>{{ site_settings.phone }}<br>{{ site_settings.email }}<br>{{ site_settings.address }}</p><a class="btn" target="_blank" href="{{ whatsapp_url }}">Chamar no WhatsApp</a></div></div></section>{% endblock %}
