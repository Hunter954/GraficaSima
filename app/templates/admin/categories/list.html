{% extends 'admin/base_admin.html' %}{% block content %}<div class="topbar"><h1>Categorias</h1><a class="btn" href="{{ url_for('admin.category_create') }}">Nova categoria</a></div><table><tr><th>Nome</th><th>Slug</th><th>Ordem</th><th>Status</th><th>Ações</th></tr>{% for item in items %}<tr><td>{{ item.name }}</td><td>{{ item.slug }}</td><td>{{ item.display_order }}</td><td>{{ 'Ativa' if item.is_active else 'Inativa' }}</td><td><a href="{{ url_for('admin.category_edit', id=item.id) }}">Editar</a><form method="post" action="{{ url_for('admin.category_toggle', id=item.id) }}" class="inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button>Alternar</button></form></td></tr>{% endfor %}</table>{% endblock %}
