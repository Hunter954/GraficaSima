{% extends 'admin/base_admin.html' %}{% block content %}<h1>Configurações do site</h1><form method="post" enctype="multipart/form-data" class="panel form-grid">{{ form.hidden_tag() }}<label>{{ form.site_name.label }}{{ form.site_name() }}</label><label>{{ form.logo.label }}{{ form.logo() }}</label><label>{{ form.whatsapp.label }}{{ form.whatsapp() }}</label><label>{{ form.email.label }}{{ form.email() }}</label><label>{{ form.phone.label }}{{ form.phone() }}</label><label>{{ form.address.label }}{{ form.address() }}</label><label>{{ form.instagram.label }}{{ form.instagram() }}</label><label>{{ form.facebook.label }}{{ form.facebook() }}</label><label>{{ form.linkedin.label }}{{ form.linkedin() }}</label><label>{{ form.opening_hours.label }}{{ form.opening_hours() }}</label><label>{{ form.seo_title.label }}{{ form.seo_title() }}</label><label class="full">{{ form.seo_description.label }}{{ form.seo_description(rows=3) }}</label><div class="full">{{ form.submit(class='btn') }}</div></form>{% endblock %}
