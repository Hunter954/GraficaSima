{% extends 'admin/base_admin.html' %}
{% block content %}
<div class="topbar">
  <h1><i class="bi bi-box"></i> {{ title }}</h1>
  <a class="btn btn-soft" href="{{ url_for('admin.products') }}"><i class="bi bi-arrow-left"></i> Voltar</a>
</div>
<form method="post" enctype="multipart/form-data" class="panel form-grid">
  {{ form.hidden_tag() }}
  <label>{{ form.name.label }}{{ form.name() }}</label>
  <label>{{ form.slug.label }}{{ form.slug() }}</label>
  <label>{{ form.category_id.label }}{{ form.category_id() }}</label>
  <label>{{ form.display_order.label }}{{ form.display_order() }}</label>
  <label class="full">{{ form.short_description.label }}{{ form.short_description(rows=3) }}</label>
  <label class="full">{{ form.full_description.label }}{{ form.full_description(rows=8) }}</label>
  <label>{{ form.main_image.label }}{{ form.main_image() }}</label>
  <label>{{ form.gallery.label }}{{ form.gallery() }}</label>
  <label class="check">{{ form.is_active() }} {{ form.is_active.label }}</label>
  <label class="check">{{ form.is_featured() }} {{ form.is_featured.label }}</label>
  <label class="full">{{ form.options_text.label }}{{ form.options_text(rows=6) }}<small>{{ form.options_text.description }}</small></label>
  <label class="full">{{ form.whatsapp_message.label }}{{ form.whatsapp_message(rows=3) }}</label>
  <h2 class="full"><i class="bi bi-search"></i> SEO</h2>
  <label>{{ form.seo_title.label }}{{ form.seo_title() }}</label>
  <label>{{ form.seo_description.label }}{{ form.seo_description(rows=3) }}</label>
  <h2 class="full"><i class="bi bi-cart"></i> Campos para e-commerce futuro</h2>
  <label>{{ form.sku.label }}{{ form.sku() }}</label>
  <label>{{ form.price.label }}{{ form.price() }}</label>
  <label>{{ form.promotional_price.label }}{{ form.promotional_price() }}</label>
  <label>{{ form.stock.label }}{{ form.stock() }}</label>
  <label class="check">{{ form.allow_online_purchase() }} {{ form.allow_online_purchase.label }}</label>
  <div class="full form-actions">{{ form.submit(class='btn') }}</div>
</form>
{% endblock %}
