<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Painel Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
  <aside class="sidebar">
    <h2><i class="bi bi-speedometer2"></i> Admin</h2>
    <a href="{{ url_for('admin.dashboard') }}"><i class="bi bi-house-door"></i> Dashboard</a>
    <a href="{{ url_for('admin.categories') }}"><i class="bi bi-tags"></i> Categorias</a>
    <a href="{{ url_for('admin.products') }}"><i class="bi bi-box-seam"></i> Produtos</a>
    <a href="{{ url_for('admin.settings') }}"><i class="bi bi-gear"></i> Configurações</a>
    <a href="{{ url_for('public.home') }}" target="_blank"><i class="bi bi-box-arrow-up-right"></i> Ver site</a>
    <a href="{{ url_for('admin.logout') }}"><i class="bi bi-door-open"></i> Sair</a>
  </aside>
  <main class="admin-main">
    {% with messages=get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for c,m in messages %}<div class="flash {{ c }}">{{ m }}</div>{% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
