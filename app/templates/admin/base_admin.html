<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Painel Admin</title><link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}"></head><body><aside class="sidebar"><h2>Admin</h2><a href="{{ url_for('admin.dashboard') }}">Dashboard</a><a href="{{ url_for('admin.categories') }}">Categorias</a><a href="{{ url_for('admin.products') }}">Produtos</a><a href="{{ url_for('admin.settings') }}">Configurações</a><a href="{{ url_for('public.home') }}" target="_blank">Ver site</a><a href="{{ url_for('admin.logout') }}">Sair</a></aside><main class="admin-main">{% with messages=get_flashed_messages(with_categories=true) %}{% if messages %}{% for c,m in messages %}<div class="flash {{ c }}">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}{% block content %}{% endblock %}</main></body></html>
